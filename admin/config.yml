backend:
  name: git-gateway
  branch: main 

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "ads"
    label: "Ads"
    folder: "ads"
    create: true
    slug: "{{title}}"
    fields:
      - {label: "Ad Name", name: "title", widget: "string"}
      - {label: "Ad Link", name: "url", widget: "string"}
      - {label: "Size", name: "size", widget: "select", options: ["x1", "x2", "x3"]}
      - {label: "Ad Image", name: "image", widget: "image"}
